name: Deploy Amazon Machine Image (AMI) to AWS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-centos:
    name: Build CentOS Base AMI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer init
        run: packer init ./centos

      - name: Packer format check
        run: packer fmt -check ./centos

      - name: Packer validate
        run: packer validate -var-file=./centos/variables.pkrvars.hcl ./centos

      - name: Packer build
        run: packer build -var-file=./centos/variables.pkrvars.hcl ./centos

  build-servicenow:
    name: Build ServiceNow AMI
    needs: build-centos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer init
        run: packer init ./servicenow

      - name: Packer format check
        run: packer fmt -check ./servicenow

      - name: Packer validate
        run: packer validate -var-file=./servicenow/variables.pkrvars.hcl ./servicenow

      - name: Packer build
        run: packer build -var-file=./servicenow/variables.pkrvars.hcl ./servicenow
