name: Deploy Static Website to S3 with CloudFront

on:
  push:
    branches:
      - main  # deploy only on master branch

# env:
#   # Setting an environment variable with the value of a configuration variable
#   env_var: ${{ vars.ENV_CONTEXT_VAR }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Packer Init
        run: packer init .
          
      # Step 3: Build CentOS Base AMI from CentOS Stream 
      - name: Build CentOS Base AMI with Packer
        run: |
          packer build ./centos


      # Step 3: Build ServiceNow Base from CentOS AMI
      - name: Build CentOS Base AMI with Packer
        run: |
          packer build -var-file=variables.pkrvars.hcl ./servicenow

          

