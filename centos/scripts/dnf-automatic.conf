# dnf-automatic configuration - apply updates automatically
# Used by centos/scripts/install.sh during AMI build

[commands]
apply_updates = yes
download_updates = yes
upgrade_type = default

[emitters]
emit_via = stdio

[email]
email_from = root@localhost

[command_email]
command = /usr/bin/true

[command_apply_updates]
command = /usr/bin/true
